/* ---- seeded faux QR -> SVG string ---- */
function makeQR(seed,dark){
  let h=0; for(let i=0;i<seed.length;i++){ h=(h*131+seed.charCodeAt(i))>>>0; }
  const n=25, cells=[];
  const rng=()=>{ h=(h*1103515245+12345)>>>0; return (h>>>8)/16777216; };
  const finder=(r,c)=> (r<7&&c<7)||(r<7&&c>=n-7)||(r>=n-7&&c<7);
  for(let r=0;r<n;r++){ const row=[]; for(let c=0;c<n;c++){
    if(finder(r,c)){ const er=(r<7)?r:r-(n-7), ec=(c<7)?c:c-(n-7);
      const edge=(er===0||er===6||ec===0||ec===6); const inner=(er>=2&&er<=4&&ec>=2&&ec<=4);
      row.push(edge||inner);
    } else row.push(rng()>0.55);
  } cells.push(row); }
  let rects='';
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(cells[r][c]) rects+='<rect x="'+c+'" y="'+r+'" width="1.02" height="1.02" fill="'+(dark||'#1C1714')+'"/>';
  return '<svg viewBox="0 0 25 25" width="100%" height="100%" shape-rendering="crispEdges" style="display:block">'+rects+'</svg>';
}

    out+='<div '+on(V.closeCreateOwner)+' style="position:fixed;inset:0;z-index:110;background:rgba(36,29,25,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px"><div '+on(V.stop)+' style="width:460px;max-width:100%;background:#fff;border-radius:22px;padding:32px;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:ts-pop .25s ease"><div style="width:50px;height:50px;border-radius:14px;background:rgba(194,65,12,.1);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px">🧑‍🍳</div><div class="km disp" style="font-size:21px;font-weight:800;margin-bottom:5px">'+V.createOwner.title+'</div><div class="km" style="font-size:13.5px;color:#9A8E82;margin-bottom:22px">'+V.createOwner.sub+'</div><div style="display:flex;flex-direction:column;gap:14px">'+fields+'</div><div style="display:flex;gap:12px;margin-top:24px"><button '+on(V.closeCreateOwner)+' class="km" style="border:1px solid #E7E0D8;background:#fff;font-size:14px;font-weight:700;color:#5C5048;padding:13px 22px;border-radius:12px;cursor:pointer">'+V.createOwner.cancelW+'</button><button '+on(V.closeCreateOwner)+' class="km" style="flex:1;border:none;background:'+V.accent+';color:#fff;font-size:14.5px;font-weight:700;padding:13px;border-radius:12px;cursor:pointer">'+V.createOwner.createW+'</button></div></div></div>';
  }
  if(V.ownerReqOpen){
    out+='<div '+on(V.closeOwnerReq)+' style="position:fixed;inset:0;z-index:110;background:rgba(36,29,25,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px"><div '+on(V.stop)+' style="width:440px;max-width:100%;background:#fff;border-radius:22px;padding:32px;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:ts-pop .25s ease"><div style="width:50px;height:50px;border-radius:14px;background:rgba(232,176,75,.2);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px">🛎</div><div class="km disp" style="font-size:21px;font-weight:800;margin-bottom:5px">'+V.reqModalTitle+'</div><div class="km" style="font-size:13.5px;color:#9A8E82;margin-bottom:22px">'+V.reqModalSub+'</div><div class="km" style="font-size:12px;font-weight:700;color:#5C5048;margin-bottom:7px">'+V.reqModalCountL+'</div><input placeholder="2" class="km" style="width:100%;border:1px solid #ECE1D5;border-radius:11px;padding:11px 14px;font-size:14px;outline:none;margin-bottom:14px"/><div class="km" style="font-size:12px;font-weight:700;color:#5C5048;margin-bottom:7px">'+V.reqModalReasonL+'</div><textarea placeholder="'+V.reqModalReasonPh+'" class="km" style="width:100%;min-height:80px;border:1px solid #ECE1D5;border-radius:11px;padding:11px 14px;font-size:14px;resize:vertical;outline:none"></textarea><div style="display:flex;gap:12px;margin-top:22px"><button '+on(V.closeOwnerReq)+' class="km" style="border:1px solid #E7E0D8;background:#fff;font-size:14px;font-weight:700;color:#5C5048;padding:13px 22px;border-radius:12px;cursor:pointer">'+V.reqModalCancel+'</button><button '+on(V.closeOwnerReq)+' class="km" style="flex:1;border:none;background:'+V.accent+';color:#fff;font-size:14.5px;font-weight:700;padding:13px;border-radius:12px;cursor:pointer">'+V.reqModalSend+'</button></div></div></div>';
  }
  if(V.loginOpen){
    out+='<div '+on(V.closeLogin)+' style="position:fixed;inset:0;z-index:100;background:rgba(36,29,25,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px"><div '+on(V.stop)+' style="width:420px;max-width:100%;background:#fff;border-radius:22px;padding:36px;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:ts-pop .25s ease"><div style="width:52px;height:52px;border-radius:15px;background:'+V.accent+';display:flex;align-items:center;justify-content:center;margin-bottom:18px">'+LOGO_SVG+'</div><div class="km disp" style="font-size:23px;font-weight:800;margin-bottom:6px">'+V.L.loginTitle+'</div><div class="km" style="font-size:14px;color:#9A8E82;margin-bottom:24px">'+V.L.loginSub+'</div><div class="km" style="font-size:12.5px;font-weight:700;color:#5C5048;margin-bottom:8px">'+V.L.phoneNumber+'</div><div style="display:flex;gap:10px;margin-bottom:18px"><div style="display:flex;align-items:center;gap:7px;border:1px solid #ECE1D5;border-radius:12px;padding:0 14px;background:#FBF7F2;font-weight:700;font-size:15px">🇰🇭 +855</div><input placeholder="12 345 678" style="flex:1;border:1px solid #ECE1D5;border-radius:12px;padding:13px 15px;font-size:15px;outline:none"/></div><button '+on(V.closeLogin)+' class="km" style="width:100%;border:none;background:'+V.accent+';color:#fff;font-size:15px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer;margin-bottom:14px">'+V.L.sendOtp+'</button><div style="display:flex;align-items:center;gap:12px;margin:8px 0 14px;color:#C3B6A9;font-size:12px"><div style="flex:1;height:1px;background:#ECE1D5"></div>'+V.L.or+'<div style="flex:1;height:1px;background:#ECE1D5"></div></div><button '+on(V.closeLogin)+' class="km" style="width:100%;border:1px solid #ECE1D5;background:#fff;color:#2A2320;font-size:14px;font-weight:600;padding:12px;border-radius:12px;cursor:pointer">'+V.L.continueGoogle+'</button></div></div>';
  }
  return out;
}

function customerLayout(V){
  let screen='';
  if(V.isHome) screen=scHome(V);
  else if(V.isSearch) screen=scSearch(V);
  else if(V.isDetail) screen=scDetail(V);
  else if(V.isBooking) screen=scBooking(V);
  else if(V.isConfirm) screen=scConfirm(V);
  else if(V.isBookings) screen=scBookings(V);
  else if(V.isProfile) screen=scProfile(V);
  return '<div style="min-height:100vh;display:flex;flex-direction:column">'+nav(V)+'<main id="appscroll" style="flex:1">'+screen+'</main>'+footer(V)+'</div>';
}

function render(){
  H=[];
  const V=renderVals();
  let html='';
  if(V.isCustomer) html=customerLayout(V);
  else if(V.isAdmin) html=adminLayout(V);
  else if(V.isAuth) html=authLayout(V);
  else if(V.isOwnerHome) html=ownerLayout(V);
  else if(V.isPlatform) html=platformLayout(V);
  html+=modals(V);
  document.getElementById('app').innerHTML=html;
}

document.getElementById('app').addEventListener('click',function(e){
  const el=e.target.closest('[data-h]');
  if(!el) return;
  const idx=+el.getAttribute('data-h');
  const rec=H[idx];
  if(rec && rec[0]==='click'){ rec[1](e); }
});
document.getElementById('app').addEventListener('input',function(e){
  const el=e.target.closest('[data-h]');
  if(!el) return;
  const idx=+el.getAttribute('data-h');
  const rec=H[idx];
  if(rec && rec[0]==='input'){ rec[1](e); }
});

render();
</script>
</body>
</html>
